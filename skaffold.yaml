apiVersion: skaffold/v4beta13
kind: Config

build:
  tagPolicy:
    sha256: {}

  artifacts:
    - image: ai-orchestration
      context: ai-orchestration
      docker:
        dockerfile: dockerfile
      sync:
        infer:
          - "src/**"

    - image: auth
      context: auth
      docker:
        dockerfile: dockerfile
      sync:
        infer:
          - "src/**"

    - image: notification
      context: notification
      docker:
        dockerfile: dockerfile
      sync:
        infer:
          - "src/**"

    - image: agent
      context: sandbox/agent
      docker:
        dockerfile: dockerfile

    - image: router
      context: sandbox/router
      docker:
        dockerfile: dockerfile

    - image: backy
      context: sandbox/server
      docker:
        dockerfile: dockerfile

    - image: client
      context: sandbox/Frontend
      docker:
        dockerfile: dockerfile

manifests:
  rawYaml:
  - k8s/ai-deployment.yaml
  - k8s/ai-server.yaml
  - k8s/auth-deployment.yaml
  - k8s/auth.service.yaml
  - k8s/sandbox-deployment.yaml
  - k8s/sandbox-service.yaml
  - k8s/sandbox-ingress.yaml
  - k8s/router-deployment.yaml
  - k8s/router-service.yaml
  - k8s/rbac.yaml
  - k8s/notification-deployment.yaml
  - k8s/notification-service.yaml


